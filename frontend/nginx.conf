# Templated: ${PORT} and ${API_URL} are substituted at container start.
# Serves the SPA and reverse-proxies /api/* to the backend (same-origin cookies).
server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass ${API_URL}/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri /index.html;
    }
}

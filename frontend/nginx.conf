# Templated: ${PORT} and ${API_URL} are substituted at container start (only
# env-defined vars are substituted, so nginx's own $host/$uri/$1 are left alone).
# Serves the SPA and reverse-proxies /api/* to the backend (same-origin cookies).
server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Photo uploads go up to 5 MB (PHOTO_MAX_BYTES); nginx's 1 MB default would
    # 413 anything larger before it reaches the backend. Keep a little headroom.
    client_max_body_size 6m;

    # Railway's internal DNS. A literal hostname in proxy_pass is resolved ONCE at
    # startup and cached forever, so a backend redeploy (new private IP) leaves
    # nginx pinned to a dead upstream and every /api request hangs. Routing through
    # a variable forces per-request resolution via this resolver instead.
    resolver [fd12::10] valid=10s ipv6=on;

    location /api/ {
        # `set` must precede the `rewrite … break` — break halts the rewrite
        # phase, and `set` is a rewrite-phase directive, so a `set` after it
        # never runs ($upstream would be empty → "invalid URL prefix").
        set $upstream ${API_URL};
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Forward the real client IP (set by Cloudflare) so the backend can rate
        # limit per-client instead of per-proxy.
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    }

    location / {
        try_files $uri /index.html;
    }
}

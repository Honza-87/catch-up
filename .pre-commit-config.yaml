# Hygiene hooks only — stack-agnostic. Add ruff (or the stack's lint/format)
# once the language is chosen; see CLAUDE.md "Tooling".
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
